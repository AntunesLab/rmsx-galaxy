runners:
  local:
    load: galaxy.jobs.runners.local:LocalJobRunner

execution:
  default: local
  environments:
    local:
      runner: local
      tmp_dir: true
      docker_enabled: true
      docker_cmd: /Applications/Docker.app/Contents/Resources/bin/docker
      docker_volumes: $defaults

tools:
  - class: local
    environment: local
